<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Nona Config</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#0e1323",
              "surface-container-lowest": "#080d1d",
              "surface-container-high": "#24293a",
              "outline": "#8b919d",
              "on-error-container": "#ffdad6",
              "secondary-fixed-dim": "#b6c8e4",
              "tertiary-fixed-dim": "#c4c7ca",
              "error-container": "#93000a",
              "on-primary-fixed-variant": "#004883",
              "on-tertiary-container": "#36393d",
              "surface-container-highest": "#2f3446",
              "surface": "#0e1323",
              "on-primary-fixed": "#001c39",
              "primary": "#60a5fa",
              "surface-container": "#1a1f2f",
              "inverse-primary": "#0060ac",
              "surface-variant": "#2f3446",
              "on-surface": "#dee1f8",
              "tertiary-fixed": "#e0e2e6",
              "secondary": "#b6c8e4",
              "outline-variant": "#414751",
              "primary-fixed-dim": "#60a5fa",
              "on-tertiary": "#2d3134",
              "inverse-surface": "#dee1f8",
              "on-error": "#690005",
              "on-secondary-container": "#a8b9d5",
              "on-tertiary-fixed-variant": "#44474a",
              "primary-container": "#60a5fa",
              "surface-tint": "#60a5fa",
              "on-tertiary-fixed": "#191c1f",
              "secondary-fixed": "#d3e3ff",
              "error": "#ffb4ab",
              "surface-dim": "#0e1323",
              "surface-container-low": "#161b2b",
              "tertiary-container": "#a0a3a7",
              "on-surface-variant": "#c1c7d3",
              "on-primary-container": "#003a6b",
              "tertiary": "#c4c7ca",
              "on-secondary-fixed-variant": "#37485f",
              "surface-bright": "#34394a",
              "on-secondary": "#203147",
              "primary-fixed": "#d4e3ff",
              "on-secondary-fixed": "#0a1c31",
              "secondary-container": "#394a61",
              "inverse-on-surface": "#2b3041",
              "on-background": "#dee1f8",
              "on-primary": "#00315d"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono", "ui-monospace"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0e1323;
            color: #dee1f8;
            font-family: 'Inter', sans-serif;
        }
        .obsidian-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Content -->
<main class="w-full max-w-md overflow-hidden rounded-lg shadow-2xl bg-surface-container-low border border-outline-variant/10">
<!-- Login Form Section -->
<section class="flex flex-col justify-center p-8 lg:p-12 bg-surface">
<div class="w-full mx-auto">
<!-- Brand Header -->
<div class="flex flex-col items-center gap-4 mb-10 text-center">
<div class="w-12 h-12 obsidian-gradient rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary font-bold" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<span class="font-headline font-bold text-3xl tracking-tighter text-primary">Nona Config</span>
</div>
<header class="mb-10 text-center">
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight mb-2">Welcome Back</h2>
<p class="text-on-surface-variant font-body">Enter your credentials to access the console.</p>
</header>
<form class="space-y-6">
<!-- Username Input -->
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-outline mb-2 group-focus-within:text-primary transition-colors" for="username">Username</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 focus:ring-0 focus:border-primary text-on-surface placeholder:text-outline/40 py-4 px-0 transition-all font-mono" id="username" name="username" placeholder="commander_zero" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="group">
<div class="flex justify-between items-center mb-2">
<label class="block text-xs font-bold uppercase tracking-widest text-outline group-focus-within:text-primary transition-colors" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 focus:ring-0 focus:border-primary text-on-surface placeholder:text-outline/40 py-4 px-0 transition-all font-mono" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-6">
<button class="w-full obsidian-gradient text-on-primary font-bold py-4 rounded-sm hover:opacity-90 transition-all active:scale-[0.98] shadow-lg shadow-primary/10 flex items-center justify-center gap-2" type="submit">
<span>Login to Console</span>
<span class="material-symbols-outlined text-lg">login</span>
</button>
</div>
</form>
<!-- Footer Meta -->
<footer class="mt-16 pt-6 border-t border-outline-variant/10">
<div class="flex items-center justify-between text-[10px] uppercase tracking-widest text-outline font-mono">
<span>Status: 200 OK</span>
<span>System ID: NC-990-2</span>
</div>
</footer>
</div>
</section>
</main>
<!-- Support Link -->
<div class="mt-8 flex items-center gap-6 text-outline text-xs uppercase tracking-widest">
<a class="hover:text-on-surface transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">contact_support</span> Support
        </a>
<a class="hover:text-on-surface transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">terminal</span> API Docs
        </a>
</div>
</body></html>
